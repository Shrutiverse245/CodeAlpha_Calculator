<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Minimal Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            padding: 20px;
        }

        .calculator-container {
            width: 100%;
            max-width: 360px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.06);
            padding: 24px;
        }

        .calculator-screen {
            width: 100%;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            text-align: right;
            padding: 12px 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }

        .previous-operand {
            color: #8e8e93;
            font-size: 1.1rem;
            min-height: 24px;
        }

        .current-operand {
            color: #1c1c1e;
            font-size: 2.5rem;
            font-weight: 300;
            margin-top: 4px;
        }

        .calculator-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .col-span-2 {
            grid-column: span 2;
        }

        .btn {
            border: none;
            outline: none;
            height: 64px;
            border-radius: 16px;
            font-size: 1.3rem;
            font-weight: 500;
            background-color: rgba(255, 255, 255, 0.7);
            color: #1c1c1e;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background-color: rgba(255, 255, 255, 0.95);
            transform: translateY(-1px);
        }

        .btn:active {
            transform: translateY(1px);
        }

        .btn-operator {
            background-color: rgba(0, 122, 255, 0.08);
            color: #007aff;
            font-size: 1.5rem;
        }

        .btn-action {
            background-color: rgba(0, 0, 0, 0.03);
            color: #555;
            font-size: 1rem;
        }

        .btn-clear {
            background-color: rgba(255, 59, 48, 0.08);
            color: #ff3b30;
        }

        .btn-equals {
            background-color: #007aff;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="calculator-container">
        <div class="calculator-screen">
            <div id="previous-operand" class="previous-operand"></div>
            <div id="current-operand" class="current-operand">0</div>
        </div>

        <div class="calculator-buttons">
            <button onclick="clearScreen()" class="btn btn-clear col-span-2">AC</button>
            <button onclick="deleteNumber()" class="btn btn-action">DEL</button>
            <button onclick="appendOperator('/')" class="btn btn-operator">÷</button>

            <button onclick="appendNumber('7')" class="btn">7</button>
            <button onclick="appendNumber('8')" class="btn">8</button>
            <button onclick="appendNumber('9')" class="btn">9</button>
            <button onclick="appendOperator('*')" class="btn btn-operator">×</button>

            <button onclick="appendNumber('4')" class="btn">4</button>
            <button onclick="appendNumber('5')" class="btn">5</button>
            <button onclick="appendNumber('6')" class="btn">6</button>
            <button onclick="appendOperator('-')" class="btn btn-operator">−</button>

            <button onclick="appendNumber('1')" class="btn">1</button>
            <button onclick="appendNumber('2')" class="btn">2</button>
            <button onclick="appendNumber('3')" class="btn">3</button>
            <button onclick="appendOperator('+')" class="btn btn-operator">+</button>

            <button onclick="appendNumber('0')" class="btn col-span-2">0</button>
            <button onclick="appendNumber('.')" class="btn">.</button>
            <button onclick="compute()" class="btn btn-equals">=</button>
        </div>
    </div>

    <script>
        let currentInput = '0';
        let previousInput = '';
        let operation = undefined;

        const currentOperandText = document.getElementById('current-operand');
        const previousOperandText = document.getElementById('previous-operand');

        function updateDisplay() {
            currentOperandText.innerText = currentInput;
            if (operation != null) {
                let opSymbol = operation;
                if (operation === '/') opSymbol = '÷';
                if (operation === '*') opSymbol = '×';
                previousOperandText.innerText = previousInput + '' + opSymbol;
            } else {
                previousOperandText.innerText = '';
            }
        }

        function appendNumber(number) {
            if (currentInput === 'Error') clearScreen();
            if (number === '.' && currentInput.includes('.')) return;
            if (currentInput === '0' && number !== '.') {
                currentInput = number.toString();
            } else {
                currentInput = currentInput.toString() + number.toString();
            }
            updateDisplay();
        }

        function appendOperator(op) {
            if (currentInput === '' && previousInput === '') return;
            if (currentInput === 'Error') return;
            if (previousInput !== '') {
                compute();
            }
            operation = op;
            previousInput = currentInput;
            currentInput = '';
            updateDisplay();
        }

        function compute() {
            let computation;
            const prev = parseFloat(previousInput);
            const current = parseFloat(currentInput);
            if (isNaN(prev) || isNaN(current)) return;

            switch (operation) {
                case '+': computation = prev + current; break;
                case '-': computation = prev - current; break;
                case '*': computation = prev * current; break;
                case '/':
                    if (current === 0) {
                        currentInput = 'Error';
                        operation = undefined;
                        previousInput = '';
                        updateDisplay();
                        return;
                    }
                    computation = prev / current;
                    break;
                default: return;
            }

            currentInput = parseFloat(computation.toFixed(10)).toString();
            operation = undefined;
            previousInput = '';
            updateDisplay();
        }

        function clearScreen() {
            currentInput = '0';
            previousInput = '';
            operation = undefined;
            updateDisplay();
        }

        function deleteNumber() {
            if (currentInput === 'Error') { clearScreen(); return; }
            if (currentInput.length <= 1) {
                currentInput = '0';
            } else {
                currentInput = currentInput.slice(0, -1);
            }
            updateDisplay();
        }
    </script>
</body>
</html>
